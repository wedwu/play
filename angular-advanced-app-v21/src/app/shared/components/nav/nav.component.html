<nav class="sidebar" aria-label="Main navigation">
  <div class="brand" aria-hidden="true">
    <span class="brand-icon material-icons">electric_bolt</span>
    <span class="brand-name">AngularPro</span>
  </div>
  <ul class="nav-list" role="list">
    @for (item of navItems; track item.path) {
      <li>
        <a [routerLink]="item.path"
           routerLinkActive="active"
           #rla="routerLinkActive"
           [attr.aria-current]="rla.isActive ? 'page' : null"
           class="nav-link">
          <span class="nav-icon material-icons" aria-hidden="true">{{ item.icon }}</span>
          <span class="nav-label">{{ item.label }}</span>
        </a>
      </li>
    }
  </ul>
  <div class="nav-footer">
    <div class="user-badge" aria-label="Signed in as Admin User, Administrator">
      <span class="avatar" aria-hidden="true">AU</span>
      <div class="user-info" aria-hidden="true">
        <span class="user-name">Admin User</span>
        <span class="user-role">Administrator</span>
      </div>
    </div>
  </div>
</nav>
