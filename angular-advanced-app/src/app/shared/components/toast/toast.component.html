<div class="toast-container">
  @for (toast of toasts; track toast.id) {
    <div class="toast" [@toastAnim] [ngClass]="'toast--' + toast.type" (click)="dismiss(toast.id)">
      <div class="toast-icon"><span class="material-icons">{{ icons[toast.type] }}</span></div>
      <div class="toast-body">
        <strong class="toast-title">{{ toast.title }}</strong>
        @if (toast.message) { <p class="toast-msg">{{ toast.message }}</p> }
      </div>
      <button class="toast-close" (click)="dismiss(toast.id); $event.stopPropagation()"><span class="material-icons">close</span></button>
    </div>
  }
</div>
