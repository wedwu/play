<nav class="navbar">
  <div class="brand">MyApp</div>
  <ul class="nav-links">
    @for (item of navItems; track item.href) {
      <li>
        <a
          [routerLink]="item.href"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: true }"
          >{{ item.label }}</a
        >
      </li>
    }
  </ul>
</nav>
