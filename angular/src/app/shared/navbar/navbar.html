<nav class="navbar">
  <div class="brand">MyApp</div>
  <ul class="nav-links">
    @for (item of navItems; track item.href) {
      <li>
        <a
          [routerLink]="item.href"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: true }"
          >{{ item.label }}</a
        >
      </li>
    }
  </ul>
  <button class="theme-toggle" (click)="themeService.toggle()" aria-label="Toggle theme">
    <span class="material-icons">{{ themeService.theme() === 'dark' ? 'light_mode' : 'dark_mode' }}</span>
  </button>
</nav>
